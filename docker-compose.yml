version: "3.9"

# ────────────────────────────────────────────────────
# Deevo Sim — Pilot-Ready Deployment
# Profiles: local (M4 Max), cloud (portable)
# Usage:
#   docker compose --profile local up -d
#   docker compose --profile cloud up -d
# ────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    profiles: ["local", "cloud"]
    environment:
      POSTGRES_DB: deevo_sim
      POSTGRES_USER: deevo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deevo_pilot_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deevo -d deevo_sim"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (signal queue + caching) ──
  redis:
    image: redis:7-alpine
    profiles: ["local", "cloud"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend API (FastAPI) ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    profiles: ["local", "cloud"]
    environment:
      DATABASE_URL: postgresql://deevo:${POSTGRES_PASSWORD:-deevo_pilot_2026}@postgres:5432/deevo_sim
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      DEEVO_ENV: ${DEEVO_ENV:-pilot}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    profiles: ["local", "cloud"]
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Ollama (local AI inference — M4 Max GPU) ──
  ollama:
    image: ollama/ollama:latest
    profiles: ["local"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 8G
    restart: unless-stopped

  # ── Nginx Reverse Proxy (cloud only) ──
  nginx:
    image: nginx:alpine
    profiles: ["cloud"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  ollama_models:
