version: "3.9"

services:
  # =============================================================================
  # PostgreSQL with PostGIS Extension
  # =============================================================================
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: io-postgres
    environment:
      POSTGRES_DB: impact_observatory
      POSTGRES_USER: observatory_admin
      POSTGRES_PASSWORD: io_pilot_2026
      POSTGRES_INITDB_ARGS: -c shared_buffers=256MB -c max_connections=200
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observatory_admin -d impact_observatory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - io-network
    restart: unless-stopped

  # =============================================================================
  # Neo4j Graph Database
  # =============================================================================
  neo4j:
    image: neo4j:5-community
    container_name: io-neo4j
    environment:
      NEO4J_AUTH: neo4j/io_graph_2026
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1024m
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/var/lib/neo4j/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p io_graph_2026 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - io-network
    restart: unless-stopped

  # =============================================================================
  # Redis Cache
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: io-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - io-network
    restart: unless-stopped

  # =============================================================================
  # Impact Observatory Backend (FastAPI)
  # =============================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: io-backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: impact_observatory
      POSTGRES_USER: observatory_admin
      POSTGRES_PASSWORD: io_pilot_2026
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: io_graph_2026
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - io-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # =============================================================================
  # Impact Observatory Frontend (Next.js)
  # =============================================================================
  frontend:
    build:
      context: ./frontend
    container_name: io-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - io-network
    restart: unless-stopped

networks:
  io-network:
    driver: bridge

volumes:
  pgdata:
  neo4j_data:
  redis_data:
