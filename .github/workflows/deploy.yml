name: Deploy Pipeline

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Gate: CI must pass first ────────────────────────────────────────────────
  ci-gate:
    uses: ./.github/workflows/ci.yml

  # ── Stage 1: Deploy to Vercel (Staging) ─────────────────────────────────────
  deploy-vercel:
    name: Deploy Frontend (Vercel)
    needs: ci-gate
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      deployment-url: ${{ steps.vercel.outputs.preview-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: "--prod"

  # ── Stage 2: Deploy Worker to Railway ───────────────────────────────────────
  deploy-railway:
    name: Deploy Worker (Railway)
    needs: ci-gate
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Worker
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_KEY }}
        run: |
          railway up \
            --service ${{ secrets.RAILWAY_SERVICE_ID }} \
            --detach

  # ── Stage 3: Health Gates ───────────────────────────────────────────────────
  health-gates:
    name: Health Validation
    needs: [deploy-vercel, deploy-railway]
    runs-on: ubuntu-latest

    steps:
      - name: Wait for deployment propagation
        run: sleep 30

      - name: Vercel Health Check
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.VERCEL_APP_URL }}/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Vercel health OK"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Vercel health check failed after 3 attempts"
          exit 1

      - name: Railway Worker Health Check
        if: secrets.RAILWAY_WORKER_URL != ''
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.RAILWAY_WORKER_URL }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Railway worker health OK"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Railway worker health check failed after 3 attempts"
          exit 1

      - name: Verify Event Bus Stats
        run: |
          RESPONSE=$(curl -s "${{ secrets.VERCEL_APP_URL }}/api/events/stats")
          echo "Event Bus Stats: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status"' || echo "$RESPONSE" | grep -q '"mode"'

  # ── Stage 4: Release Tag ────────────────────────────────────────────────────
  release-tag:
    name: Create Release Tag
    needs: health-gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: tag
        run: |
          VERSION="v$(date +'%Y.%m.%d')-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag ${{ steps.tag.outputs.version }}
          git push origin ${{ steps.tag.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "Release ${{ steps.tag.outputs.version }}"
          body: |
            Automated release from main branch.

            **Commit:** ${{ github.sha }}
            **Deploy:** Vercel (frontend) + Railway (worker)

            [View deployment health](${{ secrets.VERCEL_APP_URL }}/api/health)
          generate_release_notes: true
