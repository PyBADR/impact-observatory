name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ── Preview Build + Validation ──────────────────────────────────────────────
  preview-validate:
    name: Build & Validate Preview
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript type-check
        run: cd frontend && npx tsc --noEmit

      - name: Production build
        run: cd frontend && npm run build

      - name: Verify new API routes
        run: |
          echo "Checking build output for expected routes..."
          BUILD_OUTPUT=$(cd frontend && npm run build 2>&1 || true)
          echo "$BUILD_OUTPUT" | grep -q "/macro" && echo "✓ /macro route present"
          echo "$BUILD_OUTPUT" | grep -q "/api/v1/decision/evaluate" && echo "✓ /api/v1/decision/evaluate route present"
          echo "$BUILD_OUTPUT" | grep -q "/api/health" && echo "✓ /api/health route present"

  # ── Vercel Preview Deployment ───────────────────────────────────────────────
  preview-deploy:
    name: Preview Deploy (Vercel)
    needs: preview-validate
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Preview
        id: vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🔍 Preview Deployment\n\n**URL:** ${{ steps.vercel.outputs.preview-url }}\n\n**Health:** [${{ steps.vercel.outputs.preview-url }}/api/health](${{ steps.vercel.outputs.preview-url }}/api/health)\n**Macro:** [${{ steps.vercel.outputs.preview-url }}/macro](${{ steps.vercel.outputs.preview-url }}/macro)\n**Events:** [${{ steps.vercel.outputs.preview-url }}/api/events/stats](${{ steps.vercel.outputs.preview-url }}/api/events/stats)`
            })
